<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Afnan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FCFCFC; }
        .btn-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-transition:active { transform: scale(0.96); }
        .checkbox-custom { width: 24px; height: 24px; border: 2px solid #e5e7eb; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .checkbox-custom.checked { background: #2563eb; border-color: #2563eb; }
        .checkbox-custom i { color: white; display: none; }
        .checkbox-custom.checked i { display: block; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <header class="absolute top-0 left-0 w-full flex justify-between items-center p-6">
        <div class="text-blue-600">
            <svg viewBox="0 0 24 24" width="34" height="34" stroke="currentColor" stroke-width="2.5" fill="none">
                <path d="M12 12c-2-2.5-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.5 6-4Zm0 0c2 2.5 4 4 6 4a4 4 0 1 0 0-8c-2 0-4 1.5-6 4Z"/>
            </svg>
        </div>
    </header>

    <main class="w-full max-w-md text-center">
        <h1 class="text-[32px] font-black text-black leading-tight mb-2">أهلاً بكم في<br>أفنان للذكاء الاصطناعي</h1>
        <p class="text-gray-400 text-lg mb-10">ابدأ رحلتك الإبداعية الآن</p>

        <!-- Privacy Checkbox -->
        <div class="bg-white border border-gray-100 rounded-3xl p-5 mb-8 shadow-sm">
            <div class="flex items-center gap-4 text-right">
                <div id="privacy-check" class="checkbox-custom">
                    <i data-lucide="check" class="w-4 h-4"></i>
                </div>
                <p class="text-sm text-gray-600 leading-relaxed">
                    أوافق على <a href="#" id="view-privacy" class="text-blue-600 font-bold underline">سياسة الخصوصية</a> و <a href="#" id="view-terms" class="text-blue-600 font-bold underline">اتفاقية المستخدم</a>.
                </p>
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-[11px] font-bold text-gray-300 tracking-widest uppercase">سجل الدخول للمتابعة</p>
            
            <button id="google-login-btn" class="w-full h-16 bg-[#808080] text-white rounded-3xl flex items-center justify-center gap-3 btn-transition opacity-60 cursor-not-allowed" disabled>
                <span class="font-bold text-lg">تسجيل الدخول إلى جوجل</span>
                <svg viewBox="0 0 48 48" width="24" height="24">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
            </button>

            <button id="twitter-login-btn" class="w-full h-16 bg-white border-2 border-gray-100 text-black rounded-3xl flex items-center justify-center btn-transition opacity-60 cursor-not-allowed" disabled>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </button>
        </div>
    </main>

    <script type="module">
        import { auth, db, googleProvider, twitterProvider, signInWithPopup, doc, setDoc, getDoc } from './api.js';
        import { protectPage, navigateTo } from './router.js';

        // حماية الصفحة
        if (!protectPage('login')) {
            // إذا فشلت الحماية، سنحاول إعادة التوجيه بشكل صحيح
            console.log("Redirecting to login with correct ID...");
        }

        lucide.createIcons();

        let isAgreed = false;
        const privacyCheck = document.getElementById('privacy-check');
        const googleBtn = document.getElementById('google-login-btn');
        const twitterBtn = document.getElementById('twitter-login-btn');

        // تفعيل/تعطيل الأزرار بناءً على الموافقة
        function updateButtons() {
            if (isAgreed) {
                googleBtn.disabled = false;
                googleBtn.classList.remove('opacity-60', 'cursor-not-allowed', 'bg-[#808080]');
                googleBtn.classList.add('bg-black');
                twitterBtn.disabled = false;
                twitterBtn.classList.remove('opacity-60', 'cursor-not-allowed');
            } else {
                googleBtn.disabled = true;
                googleBtn.classList.add('opacity-60', 'cursor-not-allowed', 'bg-[#808080]');
                googleBtn.classList.remove('bg-black');
                twitterBtn.disabled = true;
                twitterBtn.classList.add('opacity-60', 'cursor-not-allowed');
            }
        }

        privacyCheck.addEventListener('click', () => {
            isAgreed = !isAgreed;
            privacyCheck.classList.toggle('checked', isAgreed);
            updateButtons();
        });

        async function handleLogin(provider) {
            if (!isAgreed) return;
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                // استخراج البريد الإلكتروني بشكل مؤكد
                const userEmail = user.email || (user.providerData && user.providerData[0] ? user.providerData[0].email : null);
                
                const userData = {
                    uid: user.uid,
                    displayName: user.displayName || 'مستخدم',
                    email: userEmail, // حفظ البريد المستخرج
                    photoURL: user.photoURL || '',
                    lastLogin: new Date().toISOString()
                };

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        ...userData,
                        balance: 20,
                        subscription: "free",
                        createdAt: new Date().toISOString()
                    });
                } else {
                    // تحديث البيانات مع التأكد من عدم مسح البريد إذا كان موجوداً مسبقاً
                    await setDoc(userRef, userData, { merge: true });
                }
                
                // Direct navigation to main page
                navigateTo('main');
            } catch (error) {
                console.error("Login Error:", error);
                alert("حدث خطأ أثناء تسجيل الدخول: " + error.message);
            }
        }

        googleBtn.addEventListener('click', () => handleLogin(googleProvider));
        twitterBtn.addEventListener('click', () => handleLogin(twitterProvider));

        // روابط السياسات
        document.getElementById('view-privacy').addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('privacy');
        });
        document.getElementById('view-terms').addEventListener('click', (e) => {
            e.preventDefault();
            navigateTo('terms');
        });
    </script>
</body>
</html>
