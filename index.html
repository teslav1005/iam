<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afnan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        /* أنيميشن لظهور الرسائل */
        .msg-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans h-screen flex overflow-hidden">

    <div id="sidebar" class="bg-gray-50 w-64 border-l border-gray-200 flex flex-col transition-all duration-300 absolute md:relative z-20 h-full transform translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center">
            <h2 class="font-bold text-lg">Afnan AI</h2>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-500"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <p class="text-sm text-gray-500 mb-2">المحادثات السابقة</p>
            </div>
    </div>

    <div class="flex-1 flex flex-col relative h-full w-full">
        
        <header class="flex justify-between items-center p-3 border-b border-gray-100 bg-white z-10">
            <button onclick="toggleSidebar()" class="text-gray-600 p-2 md:hidden">
                <i class="fas fa-bars"></i>
            </button>
            <div class="hidden md:block w-8"></div> <div class="relative">
                <button onclick="toggleModelMenu()" class="flex items-center gap-2 font-bold text-lg hover:bg-gray-100 px-3 py-1.5 rounded-xl transition">
                    <span id="current-model-name">Afnan Flow</span>
                    <i class="fas fa-chevron-down text-xs text-gray-500"></i>
                </button>

                <div id="model-menu" class="hidden absolute top-full mt-2 left-1/2 transform -translate-x-1/2 bg-white border border-gray-200 shadow-xl rounded-2xl w-72 p-2 z-50">
                    
                    <div onclick="selectModel('afnan_flow', 'Afnan Flow')" class="cursor-pointer p-3 rounded-xl hover:bg-gray-50 flex items-start gap-3 border-b border-gray-50 last:border-0">
                        <div class="bg-black text-white rounded-full w-8 h-8 flex items-center justify-center shrink-0 mt-1"><i class="fas fa-network-wired text-sm"></i></div>
                        <div>
                            <h3 class="font-bold text-md">Flow</h3>
                            <p class="text-xs text-gray-500">Afnan ai Multi-agent system</p>
                        </div>
                        <i id="check-afnan_flow" class="fas fa-check text-black mr-auto mt-2"></i>
                    </div>

                    <div onclick="selectModel('afnan_fast', 'Afnan Fast')" class="cursor-pointer p-3 rounded-xl hover:bg-gray-50 flex items-start gap-3 border-b border-gray-50 last:border-0">
                        <div class="bg-gray-100 text-black rounded-full w-8 h-8 flex items-center justify-center shrink-0 mt-1"><i class="fas fa-bolt text-sm"></i></div>
                        <div>
                            <h3 class="font-bold text-md">Fast</h3>
                            <p class="text-xs text-gray-500">سريع - Quick responses</p>
                        </div>
                        <i id="check-afnan_fast" class="fas fa-check text-black mr-auto mt-2 hidden"></i>
                    </div>

                    <div onclick="selectModel('afnan_auto', 'Afnan Auto')" class="cursor-pointer p-3 rounded-xl hover:bg-gray-50 flex items-start gap-3">
                        <div class="bg-gray-100 text-black rounded-full w-8 h-8 flex items-center justify-center shrink-0 mt-1"><i class="fas fa-lightbulb text-sm"></i></div>
                        <div>
                            <h3 class="font-bold text-md">Auto</h3>
                            <p class="text-xs text-gray-500">خبير - Expert</p>
                        </div>
                        <i id="check-afnan_auto" class="fas fa-check text-black mr-auto mt-2 hidden"></i>
                    </div>
                </div>
            </div>

            <button onclick="newChat()" class="text-gray-600 hover:bg-gray-100 p-2 rounded-full transition">
                <i class="fas fa-pen-to-square text-xl"></i>
            </button>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-40 pb-32">
            <div class="text-center text-gray-400 mt-10">
                <i class="fas fa-robot text-4xl mb-3 opacity-50"></i>
                <p>كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent p-4 md:px-20 lg:px-40">
            <div class="relative flex items-center bg-gray-100 rounded-3xl p-1 shadow-sm border border-gray-200">
                
                <button class="p-3 text-gray-400 hover:text-black transition">
                    <i class="fas fa-plus"></i>
                </button>
                
                <input type="text" id="user-input" placeholder="اكتب رسالتك..." class="flex-1 bg-transparent border-none outline-none px-2 py-3 text-gray-800" onkeypress="handleKeyPress(event)">
                
                <button id="send-btn" onclick="sendMessage()" class="bg-black text-white rounded-full w-10 h-10 flex items-center justify-center ml-1 hover:bg-gray-800 transition">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
            <div class="text-center text-xs text-gray-400 mt-2">
                MAX ❀
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAllMenus()" class="hidden fixed inset-0 z-40 bg-black bg-opacity-10 md:hidden"></div>

    <script>
        // إعدادات النظام
        let currentMode = 'afnan_flow';
        const API_URL = 'https://am-brown.vercel.app/api/chat';
        const API_PASSWORD = 'mQ7xZp4Lr8tVbN1sH3yC5uD6eG0'; // كلمة السر الخاصة بك

        // دوال الواجهة (UI Functions)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function toggleModelMenu() {
            const menu = document.getElementById('model-menu');
            menu.classList.toggle('hidden');
        }

        function closeAllMenus() {
            document.getElementById('sidebar').classList.add('translate-x-full');
            document.getElementById('model-menu').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function selectModel(modeValue, modeName) {
            currentMode = modeValue;
            document.getElementById('current-model-name').innerText = modeName;
            
            // تحديث علامة الصح (Checkmark)
            ['afnan_flow', 'afnan_fast', 'afnan_auto'].forEach(id => {
                document.getElementById(`check-${id}`).classList.add('hidden');
            });
            document.getElementById(`check-${modeValue}`).classList.remove('hidden');
            
            toggleModelMenu();
        }

        function newChat() {
            document.getElementById('chat-box').innerHTML = `
                <div class="text-center text-gray-400 mt-10 msg-fade-in">
                    <i class="fas fa-robot text-4xl mb-3 opacity-50"></i>
                    <p>محادثة جديدة. كيف يمكنني مساعدتك؟</p>
                </div>
            `;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // إضافة رسالة للواجهة
        function appendMessage(role, text, id = null) {
            const chatBox = document.getElementById('chat-box');
            // إزالة رسالة الترحيب إذا كانت موجودة
            if(chatBox.innerHTML.includes('fa-robot text-4xl')) {
                chatBox.innerHTML = '';
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex mb-6 msg-fade-in ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            if(id) msgDiv.id = id;

            const bubbleClass = role === 'user' 
                ? 'bg-gray-100 text-black px-5 py-3 rounded-2xl rounded-tl-sm max-w-[85%]' 
                : 'text-black px-2 py-3 w-full';

            msgDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${role === 'bot' ? `<div class="font-bold text-sm mb-1 text-gray-500">${document.getElementById('current-model-name').innerText}</div>` : ''}
                    <div class="content whitespace-pre-wrap leading-relaxed">${text}</div>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        // إرسال الطلب واستقباله بنظام Stream
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const message = inputEl.value.trim();
            if (!message) return;

            // 1. عرض رسالة المستخدم
            appendMessage('user', message);
            inputEl.value = '';
            
            // 2. تجهيز مكان لرسالة البوت
            const botMsgId = 'bot-msg-' + Date.now();
            appendMessage('bot', '<i class="fas fa-circle-notch fa-spin text-gray-400"></i> يفكر...', botMsgId);
            const botMsgContent = document.querySelector(`#${botMsgId} .content`);

            try {
                // إرسال الـ API Request
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_PASSWORD}` // تمرير كلمة السر في الهيدر (يمكن تغييرها للـ body إذا كان خادمك يتطلب ذلك)
                    },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        use_search: "auto",
                        stream: true
                    })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                // قراءة الـ Stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                botMsgContent.innerHTML = ''; // مسح علامة التحميل
                
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    
                    // تنظيف النص في حال كان الباك إند يرسل البيانات بصيغة SSE (مثلاً: data: "text"\n\n)
                    // إذا كان الباك إند يرسل نصاً خاماً، سيتم عرضه مباشرة
                    let textToAppend = chunk;
                    if(chunk.startsWith('data: ')) {
                        try {
                            const parsed = JSON.parse(chunk.replace('data: ', ''));
                            textToAppend = parsed.text || parsed.message || chunk;
                        } catch(e) {
                            textToAppend = chunk.replace('data: ', '');
                        }
                    }

                    if(isFirstChunk) {
                        botMsgContent.innerHTML = textToAppend;
                        isFirstChunk = false;
                    } else {
                        botMsgContent.innerHTML += textToAppend;
                    }
                    
                    // تمرير الشاشة للأسفل مع كل تحديث
                    const chatBox = document.getElementById('chat-box');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

            } catch (error) {
                console.error('Error:', error);
                botMsgContent.innerHTML = `<span class="text-red-500">حدث خطأ في الاتصال بالخادم. تأكد من إعدادات CORS أو أن الرابط صحيح.</span>`;
            }
        }
    </script>
</body>
</html>
