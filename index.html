<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Afnan AI - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        naskh: ['"Noto Naskh Arabic"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Naskh Arabic', serif;
            background-color: #f2f2f7;
            -webkit-tap-highlight-color: transparent;
        }
        .grayscale-filter {
            filter: grayscale(100%);
            opacity: 0.25;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-full max-w-md h-[100dvh] bg-[#f2f2f7] relative overflow-hidden flex flex-col">
        
        <!-- Header -->
        <div class="flex items-center justify-between p-6 pt-8">
            <div class="w-6"></div>
            <h1 class="text-xl font-bold text-[#1c1c1e]">Agents</h1>
            <i class="fas fa-chevron-left text-lg text-[#1c1c1e]"></i>
        </div>

        <div class="flex-1 overflow-y-auto px-6 pb-40">
            
            <!-- Hero Graphic (Matching Icons Arc) -->
            <div class="relative h-64 mt-2 mb-12">
                <!-- Half-circle Icons Arc -->
                <div class="absolute inset-0 flex justify-center">
                    <!-- Messenger (Center Top) -->
                    <div class="absolute top-0 w-12 h-12 shadow-sm rounded-full bg-white p-0.5 flex items-center justify-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" class="w-9 h-9">
                    </div>
                    <!-- Telegram (Right Top) -->
                    <div class="absolute top-10 right-[22%] w-10 h-10 shadow-sm rounded-full bg-white p-0.5 flex items-center justify-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-7 h-7">
                    </div>
                    <!-- LINE (Left Top) -->
                    <div class="absolute top-10 left-[22%] w-10 h-10 shadow-sm rounded-full bg-white p-0.5 flex items-center justify-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="w-7 h-7">
                    </div>
                    <!-- WhatsApp (Right Side) -->
                    <div class="absolute top-28 right-[10%] w-11 h-11 shadow-sm rounded-full bg-white p-0.5 flex items-center justify-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-8 h-8">
                    </div>
                    <!-- Slack (Left Side) -->
                    <div class="absolute top-28 left-[10%] w-10 h-10 shadow-sm rounded-full bg-white p-0.5 flex items-center justify-center">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Slack_icon_2019.svg" class="w-7 h-7">
                    </div>
                </div>

                <!-- Lowered Phone Frame -->
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-44 h-32 border-[4.5px] border-[#d1d1d6] rounded-t-[2.5rem] border-b-0 bg-[#f2f2f7]">
                    <!-- Agent Card -->
                    <div class="absolute top-8 left-1/2 -translate-x-1/2 w-[16rem] bg-white rounded-2xl shadow-xl p-3.5 flex items-center gap-3 z-20 border border-gray-50">
                        <div class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center border border-gray-100">
                            <i class="fas fa-robot text-gray-500 text-lg"></i>
                        </div>
                        <div class="flex flex-col flex-1 gap-1.5">
                            <div class="flex items-center gap-1.5">
                                <span class="font-bold text-[15px] text-[#1c1c1e]">Afnan</span>
                                <i class="fas fa-check-circle text-blue-500 text-[11px]"></i>
                            </div>
                            <div class="h-1.5 w-full bg-gray-100 rounded-full"></div>
                            <div class="h-1.5 w-1/2 bg-gray-100 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New Main Title -->
            <h2 class="text-center text-[24px] font-bold text-[#1c1c1e] mb-8 leading-tight">
                احصل Afnan ai لي تطبيقات المراسلة الخاصة بك
            </h2>

            <!-- Features White Card -->
            <div class="bg-white rounded-[2rem] p-6 shadow-sm mb-12">
                <div class="flex flex-col space-y-6">
                    <!-- Feature 1 -->
                    <div class="flex items-center justify-end gap-4 text-right">
                        <p class="text-[#1c1c1e] font-semibold text-[15px] flex-1 leading-relaxed">تخصيص afnan ai لي يقوم بي الرد ع. عملائك</p>
                        <i class="far fa-address-card text-xl text-gray-700 w-6 flex justify-center"></i>
                    </div>
                    <!-- Feature 2 -->
                    <div class="flex items-center justify-end gap-4 text-right border-t border-gray-50 pt-5">
                        <p class="text-[#1c1c1e] font-semibold text-[15px] flex-1 leading-relaxed">ذاكره و حاسوب خاص بك</p>
                        <i class="fas fa-desktop text-lg text-gray-700 w-6 flex justify-center"></i>
                    </div>
                    <!-- Feature 3 -->
                    <div class="flex items-center justify-end gap-4 text-right border-t border-gray-50 pt-5">
                        <p class="text-[#1c1c1e] font-semibold text-[15px] flex-1 leading-relaxed">مهارات مخصصه</p>
                        <i class="fas fa-puzzle-piece text-xl text-gray-700 w-6 flex justify-center"></i>
                    </div>
                    <!-- Feature 4 -->
                    <div class="flex items-center justify-end gap-4 text-right border-t border-gray-50 pt-5">
                        <p class="text-[#1c1c1e] font-semibold text-[15px] flex-1 leading-relaxed">يعمل ويرد ع العملا بدلا منك</p>
                        <i class="far fa-comment-dots text-xl text-gray-700 w-6 flex justify-center"></i>
                    </div>
                    <!-- Feature 5 (QR) -->
                    <div class="flex items-center justify-end gap-4 text-right border-t border-gray-50 pt-5">
                        <p class="text-[#1c1c1e] font-semibold text-[15px] flex-1 leading-relaxed">انشا QR واربطه بي منصتك وتركه يعمل بدلات عنك</p>
                        <i class="fas fa-qrcode text-xl text-gray-700 w-6 flex justify-center"></i>
                    </div>

                    <!-- Grayscale Platforms Section (Updated) -->
                    <div class="flex items-center justify-between pt-6 border-t border-gray-50">
                        <div class="flex items-center gap-2 grayscale-filter">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" class="w-6 h-6">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-6 h-6">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="w-6 h-6">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Slack_icon_2019.svg" class="w-6 h-6">
                        </div>
                        <span class="text-gray-400 text-[13px] font-medium">مزيد من المنصات قريباً</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sticky Bottom CTA -->
        <div class="absolute bottom-0 left-0 right-0 p-6 pb-12 bg-gradient-to-t from-[#f2f2f7] via-[#f2f2f7] to-transparent">
            <button onclick="openModal()" class="w-full bg-[#000000] text-white rounded-[1.4rem] py-4.5 h-16 flex items-center justify-center gap-3 active:scale-[0.98] transition-transform shadow-lg">
                <div class="flex items-center -space-x-1.5 space-x-reverse ml-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-5 h-5 rounded-full border border-black z-30">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="w-5 h-5 rounded-full border border-black z-20">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" class="w-5 h-5 rounded-full border border-black z-10">
                </div>
                <span class="text-lg font-bold">ابدأ الآن</span>
            </button>
        </div>

        <!-- Modal Overlay & Bottom Sheet -->
        <div id="modalOverlay" class="absolute inset-0 bg-black/40 z-40 opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-[2px]" onclick="closeModal()"></div>
        
        <div id="bottomSheet" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] z-50 transform translate-y-full transition-transform duration-300 ease-out flex flex-col p-6 pb-14 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="w-11 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            
            <div class="space-y-2">
                <!-- WhatsApp is the ONLY active one -->
                <div class="flex items-center justify-between py-4 border-b border-gray-50 last:border-0">
                    <button class="text-[#007aff] font-bold text-[17px] active:opacity-50" onclick="window.open('https://wa.me/')">اتصال</button>
                    <div class="flex items-center gap-4">
                        <span class="text-lg font-bold text-[#1c1c1e]">WhatsApp</span>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-10 h-10">
                    </div>
                </div>

                <!-- Others (Soon / Grayscale) -->
                <div class="flex items-center justify-between py-4 opacity-30">
                    <span class="text-gray-400 font-bold">قريباً</span>
                    <div class="flex items-center gap-4">
                        <span class="text-lg font-bold text-[#1c1c1e]">Telegram</span>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-10 h-10">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function openModal() {
            document.getElementById('modalOverlay').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('bottomSheet').classList.remove('translate-y-full');
        }
        function closeModal() {
            document.getElementById('modalOverlay').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('bottomSheet').classList.add('translate-y-full');
        }
    </script>
</body>
</html>
