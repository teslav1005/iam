<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afnan AI v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .msg-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-gray-900 h-screen flex overflow-hidden">

    <div id="sidebar" class="bg-gray-50 w-72 border-l border-gray-200 flex flex-col transition-all duration-300 absolute md:relative z-30 h-full transform translate-x-full md:translate-x-0">
        <div class="p-5 border-b border-gray-200 flex justify-between items-center bg-white">
            <h2 class="font-bold text-xl tracking-tight">Afnan AI</h2>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-black"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-4">السجل</div>
            <div class="text-sm text-gray-400 italic">لا يوجد محادثات حالياً</div>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative w-full bg-white">
        
        <header class="flex justify-between items-center px-4 py-3 border-b border-gray-50 bg-white/80 backdrop-blur-md sticky top-0 z-20">
            <button onclick="toggleSidebar()" class="text-gray-500 p-2 md:hidden hover:bg-gray-100 rounded-lg">
                <i class="fas fa-bars"></i>
            </button>
            <div class="hidden md:block w-10"></div>

            <div class="relative">
                <button onclick="toggleModelMenu()" class="flex items-center gap-2 font-bold text-lg hover:bg-gray-100 px-4 py-2 rounded-2xl transition-all">
                    <span id="current-model-name">Afnan Flow</span>
                    <i class="fas fa-chevron-down text-[10px] text-gray-400"></i>
                </button>

                <div id="model-menu" class="hidden absolute top-full mt-2 left-1/2 transform -translate-x-1/2 bg-white border border-gray-200 shadow-2xl rounded-3xl w-80 p-2 z-50 animate-in fade-in zoom-in duration-200">
                    
                    <div onclick="selectModel('afnan_flow', 'Afnan Flow')" class="cursor-pointer p-4 rounded-2xl hover:bg-gray-50 flex items-start gap-4 border-b border-gray-50">
                        <div class="bg-black text-white rounded-full w-9 h-9 flex items-center justify-center shrink-0 mt-1 shadow-lg"><i class="fas fa-network-wired text-sm"></i></div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-gray-900">Flow</h3>
                                <i id="check-afnan_flow" class="fas fa-check-circle text-black"></i>
                            </div>
                            <p class="text-xs text-gray-500 leading-relaxed">Afnan ai Multi-agent system (خبير)</p>
                        </div>
                    </div>

                    <div onclick="selectModel('afnan_fast', 'Afnan Fast')" class="cursor-pointer p-4 rounded-2xl hover:bg-gray-50 flex items-start gap-4 border-b border-gray-50">
                        <div class="bg-gray-100 text-gray-600 rounded-full w-9 h-9 flex items-center justify-center shrink-0 mt-1"><i class="fas fa-bolt text-sm"></i></div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-gray-900">Fast</h3>
                                <i id="check-afnan_fast" class="fas fa-check-circle text-black hidden"></i>
                            </div>
                            <p class="text-xs text-gray-500 leading-relaxed">استجابة سريعة جداً للمهام البسيطة</p>
                        </div>
                    </div>

                    <div onclick="selectModel('afnan_auto', 'Afnan Auto')" class="cursor-pointer p-4 rounded-2xl hover:bg-gray-50 flex items-start gap-4">
                        <div class="bg-gray-100 text-gray-600 rounded-full w-9 h-9 flex items-center justify-center shrink-0 mt-1"><i class="fas fa-magic text-sm"></i></div>
                        <div class="flex-1">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold text-gray-900">Auto</h3>
                                <i id="check-afnan_auto" class="fas fa-check-circle text-black hidden"></i>
                            </div>
                            <p class="text-xs text-gray-500 leading-relaxed">يختار النموذج الأنسب تلقائياً</p>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="location.reload()" title="محادثة جديدة وتحديث" class="text-gray-500 hover:bg-gray-100 p-2.5 rounded-xl transition-all">
                <i class="fas fa-rotate-right text-lg"></i>
            </button>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:px-24 lg:px-64 pb-40">
            <div class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-40">
                <i class="fas fa-feather-pointed text-5xl"></i>
                <p class="text-lg font-medium">ابدأ حواراً ذكياً مع Afnan Flow</p>
            </div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent pt-10 pb-6 px-4 md:px-24 lg:px-64">
            <div class="relative flex items-center bg-gray-50 rounded-[2rem] p-1.5 shadow-sm border border-gray-200 focus-within:border-gray-400 transition-all">
                <button class="p-3 text-gray-400 hover:text-black transition">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="text" id="user-input" placeholder="كيف يمكنني مساعدتك اليوم؟" class="flex-1 bg-transparent border-none outline-none px-3 py-3 text-[16px]" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()" class="bg-black text-white rounded-full w-11 h-11 flex items-center justify-center ml-1 hover:scale-105 active:scale-95 transition-all">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
            <div class="flex justify-center items-center gap-2 mt-3">
                <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Max ❀ Afnan AI v3.0</span>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeAllMenus()" class="hidden fixed inset-0 z-20 bg-black/10 backdrop-blur-sm md:hidden"></div>

    <script>
        let currentMode = 'afnan_flow';
        const API_URL = 'https://am-brown.vercel.app/api/chat';
        const API_PASSWORD = 'mQ7xZp4Lr8tVbN1sH3yC5uD6eG0';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleModelMenu() {
            document.getElementById('model-menu').classList.toggle('hidden');
        }

        function closeAllMenus() {
            document.getElementById('sidebar').classList.add('translate-x-full');
            document.getElementById('model-menu').classList.add('hidden');
            document.getElementById('overlay').classList.add('hidden');
        }

        function selectModel(modeValue, modeName) {
            currentMode = modeValue;
            document.getElementById('current-model-name').innerText = modeName;
            ['afnan_flow', 'afnan_fast', 'afnan_auto'].forEach(id => {
                document.getElementById(`check-${id}`).classList.add('hidden');
            });
            document.getElementById(`check-${modeValue}`).classList.remove('hidden');
            toggleModelMenu();
        }

        function appendMessage(role, text, id = null) {
            const chatBox = document.getElementById('chat-box');
            if(chatBox.querySelector('.opacity-40')) chatBox.innerHTML = '';

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex mb-8 msg-fade-in ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            if(id) msgDiv.id = id;

            const bubbleClass = role === 'user' 
                ? 'bg-gray-100 text-gray-800 px-6 py-3.5 rounded-[1.8rem] rounded-bl-md max-w-[85%] shadow-sm' 
                : 'text-gray-900 px-2 py-3 w-full';

            msgDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${role === 'bot' ? `<div class="flex items-center gap-2 mb-2 text-xs font-bold text-gray-400 uppercase tracking-tighter"><i class="fas fa-robot"></i> ${document.getElementById('current-model-name').innerText}</div>` : ''}
                    <div class="content whitespace-pre-wrap leading-[1.7] text-[16px]">${text}</div>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const message = inputEl.value.trim();
            if (!message) return;

            appendMessage('user', message);
            inputEl.value = '';
            
            const botMsgId = 'bot-msg-' + Date.now();
            appendMessage('bot', '<i class="fas fa-circle-notch fa-spin text-gray-300"></i>', botMsgId);
            const botMsgContent = document.querySelector(`#${botMsgId} .content`);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Custom-Api-Key': API_PASSWORD
                    },
                    body: JSON.stringify({
                        message: message,
                        mode: currentMode,
                        use_search: "auto",
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";
                botMsgContent.innerHTML = ""; 

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (let line of lines) {
                        let trimmedLine = line.trim();
                        if (!trimmedLine || trimmedLine === 'data: [DONE]') continue;

                        if (trimmedLine.startsWith('data: ')) {
                            try {
                                const jsonStr = trimmedLine.replace('data: ', '');
                                const parsed = JSON.parse(jsonStr);
                                // استهداف حقل content من v3.0
                                if (parsed.content) {
                                    fullText += parsed.content;
                                    botMsgContent.innerText = fullText; 
                                }
                            } catch (e) {
                                // في حال أرسل السيرفر نصاً خاماً بدون JSON
                                let rawText = trimmedLine.replace('data: ', '');
                                if (rawText) {
                                    fullText += rawText;
                                    botMsgContent.innerText = fullText;
                                }
                            }
                        }
                    }
                    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                }

            } catch (error) {
                botMsgContent.innerHTML = `<span class="text-red-400 text-sm">عذراً، حدث خطأ في الاتصال. جرب التحديث.</span>`;
            }
        }
    </script>
</body>
</html>
