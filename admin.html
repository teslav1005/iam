<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afnan AI - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-gray-900">لوحة التحكم (Admin)</h1>
            <button onclick="window.location.href='afnan.html'" class="text-sm font-bold text-blue-600">العودة للتطبيق</button>
        </header>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- إدارة الاشتراكات -->
            <div class="card">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="users" class="w-5 h-5"></i> طلبات الاشتراكات
                </h2>
                <div id="requests-list" class="space-y-4 max-h-96 overflow-y-auto">
                    <p class="text-center text-gray-400 text-sm">جاري تحميل الطلبات...</p>
                </div>
            </div>

            <!-- إرسال الإشعارات -->
            <div class="card">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> إرسال إشعار
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-1">المستلم</label>
                        <select id="notif-target" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                            <option value="all">الكل</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-1">الرسالة</label>
                        <textarea id="notif-message" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-32" placeholder="اكتب نص الإشعار هنا..."></textarea>
                    </div>
                    <button onclick="sendNotification()" class="w-full py-4 bg-black text-white font-bold rounded-xl active:scale-95 transition">إرسال الآن</button>
                </div>
            </div>
        </div>

        <!-- قائمة المستخدمين -->
        <div class="card mt-8">
            <h2 class="text-lg font-bold mb-4">المستخدمين المسجلين</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-gray-400 text-xs border-b">
                            <th class="pb-2">المستخدم</th>
                            <th class="pb-2">البريد</th>
                            <th class="pb-2">الرصيد</th>
                            <th class="pb-2">الاشتراك</th>
                            <th class="pb-2">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- المستخدمين هنا -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, onSnapshot, updateDoc, doc, addDoc, getDocs, query, where } from './api.js';

        lucide.createIcons();

        // تحميل طلبات الاشتراك
        onSnapshot(collection(db, "subscription_requests"), (snapshot) => {
            const list = document.getElementById('requests-list');
            list.innerHTML = '';
            if (snapshot.empty) {
                list.innerHTML = '<p class="text-center text-gray-400 text-sm">لا توجد طلبات معلقة</p>';
                return;
            }
            snapshot.forEach((docSnap) => {
                const req = docSnap.data();
                if (req.status === 'pending') {
                    const el = document.createElement('div');
                    el.className = 'p-4 bg-gray-50 rounded-xl border flex justify-between items-center';
                    el.innerHTML = `
                        <div>
                            <p class="text-sm font-bold">${req.email}</p>
                            <p class="text-xs text-blue-600">خطة: ${req.plan}</p>
                        </div>
                        <button onclick="window.approveSubscription('${docSnap.id}', '${req.userId}', '${req.plan}')" class="px-4 py-2 bg-green-500 text-white text-xs font-bold rounded-lg">تفعيل</button>
                    `;
                    list.appendChild(el);
                }
            });
        });

        // تحميل المستخدمين
        onSnapshot(collection(db, "users"), (snapshot) => {
            const tbody = document.getElementById('users-table-body');
            const targetSelect = document.getElementById('notif-target');
            tbody.innerHTML = '';
            // Reset select but keep "all"
            targetSelect.innerHTML = '<option value="all">الكل</option>';

            snapshot.forEach((docSnap) => {
                const user = docSnap.data();
                const tr = document.createElement('tr');
                tr.className = 'border-b last:border-0';
                tr.innerHTML = `
                    <td class="py-4 text-sm font-bold">${user.displayName || 'بدون اسم'}</td>
                    <td class="py-4 text-sm text-gray-500">${user.email}</td>
                    <td class="py-4 text-sm font-bold">${user.balance || 0}</td>
                    <td class="py-4 text-sm"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-[10px] font-bold">${user.subscription || 'free'}</span></td>
                    <td class="py-4">
                        <button onclick="window.addBalance('${docSnap.id}', ${user.balance || 0})" class="text-xs text-green-600 font-bold">+ رصيد</button>
                    </td>
                `;
                tbody.appendChild(tr);

                // Add to notification target select
                const opt = document.createElement('option');
                opt.value = user.uid;
                opt.innerText = user.displayName || user.email;
                targetSelect.appendChild(opt);
            });
        });

        window.approveSubscription = async function(reqId, userId, plan) {
            const balanceToAdd = plan === 'pro' ? 1000 : 200;
            await updateDoc(doc(db, "users", userId), {
                subscription: plan,
                balance: balanceToAdd
            });
            await updateDoc(doc(db, "subscription_requests", reqId), { status: 'approved' });
            alert('تم تفعيل الاشتراك بنجاح');
        };

        window.addBalance = async function(userId, currentBalance) {
            const amount = prompt("أدخل الكمية المراد إضافتها:");
            if (amount) {
                await updateDoc(doc(db, "users", userId), {
                    balance: parseInt(currentBalance) + parseInt(amount)
                });
                alert('تمت إضافة الرصيد');
            }
        };

        window.sendNotification = async function() {
            const target = document.getElementById('notif-target').value;
            const message = document.getElementById('notif-message').value;

            if (!message) return alert('يرجى كتابة الرسالة');

            await addDoc(collection(db, "notifications"), {
                userId: target,
                message: message,
                createdAt: new Date().toISOString()
            });

            alert('تم إرسال الإشعار بنجاح');
            document.getElementById('notif-message').value = '';
        };
    </script>
</body>
</html>
